version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: hudud_bot_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hudud_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-hudud_bot_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hudud_bot} -d ${POSTGRES_DB:-hudud_bot_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: hudud_bot_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  bot:
    build: .
    container_name: hudud_bot
    env_file: .env
    environment:
      - SERVICE_TYPE=bot
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    ports:
      - "8080:8080"
    restart: unless-stopped
    command: python -m app.main

  scheduler:
    build: .
    container_name: hudud_bot_scheduler
    env_file: .env
    environment:
      - SERVICE_TYPE=scheduler
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      bot:
        condition: service_started
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    command: python -m app.scheduler.runner

volumes:
  postgres_data:
  redis_data:
